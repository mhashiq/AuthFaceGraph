# ================================================================
# AuthBrain AI Face Analysis Engine
# Docker Compose — Full Stack (Backend + Frontend + Infrastructure)
# ================================================================

version: "3.9"

services:

  # ── PostgreSQL Database ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: authbrain_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-authbrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-authbrain_dev}
      POSTGRES_DB:       ${POSTGRES_DB:-authbrain_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-authbrain}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: authbrain_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Backend (FastAPI) ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: authbrain_backend
    restart: unless-stopped
    environment:
      ENVIRONMENT:       development
      DEBUG:             "false"
      POSTGRES_USER:     ${POSTGRES_USER:-authbrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-authbrain_dev}
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     "5432"
      POSTGRES_DB:       ${POSTGRES_DB:-authbrain_db}
      REDIS_URL:         redis://redis:6379/0
      JWT_SECRET_KEY:    ${JWT_SECRET_KEY:-REPLACE_IN_PRODUCTION}
      ALLOWED_ORIGINS:   '["http://localhost:3000","http://localhost:80"]'
    volumes:
      - ./backend:/app
      - ./models:/app/models:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Frontend (Vite / React) ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: authbrain_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL:  http://localhost:8000
      VITE_WS_URL:   ws://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ── Nginx Reverse Proxy (production) ───────────────────────────
  nginx:
    image: nginx:alpine
    container_name: authbrain_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    profiles:
      - production  # Only start with: docker compose --profile production up


volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: authbrain_network
